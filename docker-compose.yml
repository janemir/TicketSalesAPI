version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  service-db:
    build: ./TicketSalesAPI
    container_name: service-db
    ports:
      - "8080:8080"
    environment:
      - EventStoreDatabase__ConnectionString=mongodb://mongodb:27017
      - EventStoreDatabase__DatabaseName=TicketSalesDB
      - EventStoreDatabase__EventsCollectionName=Events
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mongodb
    restart: unless-stopped

  service-nodb:
    build: ./TicketSalesAPI_NoDB
    container_name: service-nodb
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - service-db
      - service-nodb
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mongo_data: