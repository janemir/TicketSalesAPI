services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  service-db:
    build: ./TicketSalesAPI
    container_name: service-db
    ports:
      - "8080:8080"
    environment:
      - EventStoreDatabase__ConnectionString=mongodb://mongodb:27017
      - EventStoreDatabase__DatabaseName=TicketSalesDB
      - EventStoreDatabase__EventsCollectionName=Events
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Jwt__Issuer=TicketSales.Auth
      - Jwt__Audience=TicketSales.Api
      - Jwt__Key=CHANGE_ME_SUPER_SECRET_KEY_32_CHARS_MIN
      - Redis__Configuration=redis:6379
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  user-service:
    build: ./UserService
    container_name: user-service
    ports:
      - "8082:8080"
    environment:
      - UserDatabase__ConnectionString=mongodb://mongodb:27017
      - UserDatabase__DatabaseName=TicketSalesDB
      - UserDatabase__UsersCollectionName=Users
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Jwt__Issuer=TicketSales.Auth
      - Jwt__Audience=TicketSales.Api
      - Jwt__Key=CHANGE_ME_SUPER_SECRET_KEY_32_CHARS_MIN
    depends_on:
      - mongodb
    restart: unless-stopped

  auth-service:
    build: ./AuthService
    container_name: auth-service
    ports:
      - "8083:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Jwt__Issuer=TicketSales.Auth
      - Jwt__Audience=TicketSales.Api
      - Jwt__Key=CHANGE_ME_SUPER_SECRET_KEY_32_CHARS_MIN
    restart: unless-stopped

  api-gateway:
    build: ./ApiGateway
    container_name: api-gateway
    ports:
      - "7000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Jwt__Issuer=TicketSales.Auth
      - Jwt__Audience=TicketSales.Api
      - Jwt__Key=CHANGE_ME_SUPER_SECRET_KEY_32_CHARS_MIN
    depends_on:
      - service-db
      - user-service
      - auth-service
    restart: unless-stopped

  service-nodb:
    build: ./TicketSalesAPI_NoDB
    container_name: service-nodb
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - service-db
      - service-nodb
      - user-service
      - api-gateway
      - auth-service
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data: